name: email-triage-env
version: "1.0.0"
description: >
  An RL environment for email triage that teaches agents to balance
  action cost asymmetry (Blind Spot #1) and relationship decay (Blind Spot #4).

framework: openenv

environment:
  server_url: http://localhost:8000
  endpoints:
    reset: POST /reset
    step:  POST /step
    state: GET  /state
  action_space:
    type: discrete
    n: 2
    labels: [ignore, respond]

tasks:
  - id: task_1
    name: "Basic Prioritization"
    difficulty: easy
    config_file: tasks/task_1_easy.json
    max_steps: 20

  - id: task_2
    name: "VIP Tracking"
    difficulty: medium
    config_file: tasks/task_2_medium.json
    max_steps: 25

  - id: task_3
    name: "Full Relationship Management"
    difficulty: hard
    config_file: tasks/task_3_hard.json
    max_steps: 30

grading:
  script: grader.py
  function: grade_episode
  score_range: [0, 100]

deployment:
  platform: huggingface_spaces
  docker: server/Dockerfile
  port: 8000
